<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中医药自选课题申报管理平台 - 机构管理员</title>
    <!-- 引入 premium 字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/common.css">
    <link rel="stylesheet" href="/css/components.css">
</head>
<body>

    <!-- 头部导航 -->
    <header>
        <a class="logo-area" href="/">
            <div class="logo-icon">
                <svg viewBox="0 0 64 64" style="width: 28px; height: 28px; display: block;" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="32" cy="32" r="30" stroke="var(--primary)" stroke-width="2" fill="none" opacity="0.2"/>
                    <circle cx="32" cy="32" r="27" stroke="var(--accent)" stroke-width="1.2" fill="none" stroke-dasharray="3 2" opacity="0.6"/>
                    <path d="M32 12 C25 12 23 18 28 24 C23 30 19 36 21 46 C24 53 32 53 32 53 Z" fill="var(--primary)"/>
                    <path d="M32 12 C38 12 40 18 36 24 C41 30 45 36 43 46 C40 53 32 53 32 53 Z" fill="var(--accent)"/>
                    <path d="M32 12 C28 18 36 24 32 30 C28 36 36 42 32 53" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round"/>
                    <circle cx="37" cy="40" r="2.5" fill="#ffffff" opacity="0.9"/>
                    <circle cx="27" cy="18" r="1.5" fill="#ffffff" opacity="0.9"/>
                </svg>
            </div>
            <div class="logo-text">
                <h1>中医药课题申报平台</h1>
                <p>INSTITUTION ADMIN</p>
            </div>
        </a>

        <div class="header-actions">
            <div class="user-profile-widget" id="user-profile-box">
                <div class="user-avatar" id="profile-avatar">-</div>
                <span id="profile-name">加载中...</span>
                <button onclick="api.auth.logout()" class="logout-btn">安全退出</button>
            </div>
        </div>
    </header>

    <!-- 主布局 -->
    <div class="main-container">
        <!-- 侧边导航栏 -->
        <div class="sidebar">
            <ul class="sidebar-menu">
                <li class="menu-item active" id="org-menu-users" onclick="switchOrgPanel('users')">
                    <a href="#">
                        <svg class="icon-svg icon-btn" viewBox="0 0 24 24" style="fill:none; stroke:currentColor; stroke-width:2;"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                        员工审核与授权
                    </a>
                </li>
                <li class="menu-item" id="org-menu-topics" onclick="switchOrgPanel('topics')">
                    <a href="#">
                        <svg class="icon-svg icon-btn" viewBox="0 0 24 24" style="fill:none; stroke:currentColor; stroke-width:2;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                        本机构课题审核
                    </a>
                </li>
            </ul>
        </div>

        <!-- 主内容视窗 -->
        <div class="viewport">
            <div class="panel active">
                <div class="panel-header">
                    <div class="panel-title">
                        <h2>机构管理员控制台</h2>
                        <p id="org-name-title">申报机构：正在获取单位信息...</p>
                    </div>
                </div>

                <!-- 机构额度展示 -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <span class="label">本单位申报总名额</span>
                        <span class="val" id="org-quota-total">0</span>
                    </div>
                    <div class="stat-card">
                        <span class="label">已指派申报权限人</span>
                        <span class="val" id="org-quota-assigned">0</span>
                    </div>
                    <div class="stat-card">
                        <span class="label">本单位已正式提交课题</span>
                        <span class="val" id="org-topics-submitted">0</span>
                    </div>
                </div>

                <!-- 员工列表子标签 -->
                <div id="org-tab-users" class="org-tab-content">
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>姓名</th>
                                    <th>手机号</th>
                                    <th>账号状态</th>
                                    <th>申报授权(名额内)</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="org-users-body">
                                <tr><td colspan="5" style="text-align:center;">数据加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- 课题列表子标签 -->
                <div id="org-tab-topics" class="org-tab-content" style="display: none;">
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>课题名称</th>
                                    <th>申报人</th>
                                    <th>主要方向</th>
                                    <th>提交日期</th>
                                    <th>附件下载</th>
                                    <th>状态</th>
                                    <th>评审结果</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="org-topics-body">
                                <tr><td colspan="8" style="text-align:center;">数据加载中...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 课题审核/详情通用弹窗 -->
    <div class="modal" id="topic-detail-modal">
        <div class="modal-content" style="max-width: 700px;">
            <div class="modal-header">
                <h3>本机构申报课题初审意见录入</h3>
                <button class="close-btn" onclick="closeModal('topic-detail-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="detail-topic-id">
                <table style="width: 100%; border: 1px solid #e2e8f0; margin-bottom: 1.5rem;">
                    <tr>
                        <th style="width: 25%; padding: 0.75rem;">课题名称</th>
                        <td id="detail-title" style="padding: 0.75rem;">-</td>
                    </tr>
                    <tr>
                        <th style="padding: 0.75rem;">主要研究方向</th>
                        <td id="detail-category" style="padding: 0.75rem;">-</td>
                    </tr>
                    <tr>
                        <th style="padding: 0.75rem;">申报人</th>
                        <td id="detail-declarer" style="padding: 0.75rem;">-</td>
                    </tr>
                    <tr>
                        <th style="padding: 0.75rem;">附件下载</th>
                        <td id="detail-attachments" style="padding: 0.75rem;">-</td>
                    </tr>
                </table>

                <div class="form-group">
                    <label class="form-label">初审意见录入 *</label>
                    <textarea class="form-control" id="detail-audit-opinion" rows="4" required placeholder="请输入您的意见，以便申报人查阅并退回修改..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline btn-sm" onclick="submitAudit(2)" style="color:#ef4444; border-color:#fee2e2;">初审不通过退回</button>
                <button class="btn btn-primary btn-sm" onclick="submitAudit(1)">初审通过推荐上报</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast-box"></div>

    <script src="/js/api.js"></script>
    <script src="/js/org_dashboard.js"></script>
</body>
</html>
